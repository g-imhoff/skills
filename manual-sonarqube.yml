name: Manual SonarQube Scan

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to scan
        required: true
        default: develop
        type: string

concurrency:
  group: manual-sonarqube-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Manual checks and SonarQube scan
    runs-on:
      - self-hosted
      - linux
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || github.event.repository.name }}
      SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME || github.event.repository.name }}

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Explain SonarQube Community Edition limitations
        run: |
          echo "Manual SonarQube scan requested for ref: ${{ inputs.ref }}"
          echo "This workflow is a manual workaround for SonarQube Community Edition."
          echo "It does not provide true PR analysis or branch analysis."
          echo "Results may update the single project analysis context instead of creating branch-specific results."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            yodea-app/src-tauri -> target

      - name: Install JavaScript dependencies
        working-directory: yodea-app
        run: bun install --frozen-lockfile

      - name: Run checks
        working-directory: yodea-app
        run: bun run check

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: yodea-app
          args: >
            --define sonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            --define sonar.projectName=${{ env.SONAR_PROJECT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
          scanMetadataReportFile: yodea-app/.scannerwork/report-task.txt
